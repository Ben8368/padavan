name: Build MI-MINI Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write
    # Star 触发时，仅 repo owner 的 star 才会触发编译
    if: >-
      github.event_name != 'watch' ||
      github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            unzip libtool-bin curl cmake gperf gawk flex bison nano xxd \
            fakeroot kmod cpio git python3-docutils gettext automake autopoint \
            texinfo build-essential help2man pkg-config zlib1g-dev libgmp3-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget libc-dev-bin \
            python3

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain-mipsel/toolchain-4.4.x
          key: toolchain-mipsel-${{ runner.arch }}

      - name: Download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd toolchain-mipsel
          bash dl_toolchain.sh

      - name: Build firmware
        run: |
          cd trunk
          fakeroot ./build_firmware_ci MI-MINI

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MI-MINI-firmware
          path: trunk/images/*.trx
          retention-days: 30

      - name: Create Release
        if: success() && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd trunk/images
          FIRMWARE_FILE=$(ls *.trx | head -1)
          if [ -z "$FIRMWARE_FILE" ]; then
            echo "No .trx file found, skipping release"
            exit 0
          fi
          # 从文件名提取版本号，如 MI-MINI_4.4.3.9-100.trx -> v3.9-100
          VERSION=$(echo "$FIRMWARE_FILE" | grep -oP '\d+\.\d+-\d+' | head -1)
          TAG="v${VERSION}-$(date +%Y%m%d)"
          RELEASE_NAME="MI-MINI Firmware ${VERSION} ($(date +%Y-%m-%d))"
          echo "Creating release: $TAG"
          echo "Firmware: $FIRMWARE_FILE"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_NAME" \
            --notes "Auto-built firmware: $FIRMWARE_FILE" \
            --latest \
            "$FIRMWARE_FILE"
