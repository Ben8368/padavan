name: Build MI-MINI Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            unzip libtool-bin curl cmake gperf gawk flex bison nano xxd \
            fakeroot kmod cpio git python3-docutils gettext automake autopoint \
            texinfo build-essential help2man pkg-config zlib1g-dev libgmp3-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget libc-dev-bin \
            python3

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain-mipsel/toolchain-4.4.x
          key: toolchain-mipsel-${{ runner.arch }}

      - name: Download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd toolchain-mipsel
          bash dl_toolchain.sh

      - name: Build firmware
        run: |
          cd trunk
          fakeroot ./build_firmware_ci MI-MINI

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MI-MINI-firmware
          path: trunk/images/*.trx
          retention-days: 30
